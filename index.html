<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MedAuth AI · Auditoría Completa</title>
<style>
  :root {
    --bg:#0e1116; --panel:#171a21; --panel-2:#1f2330; --border:#2a2f3d;
    --text:#eaf2ef; --muted:#8a93a3; 
    --primary:#10b981; /* Verde - Aprobado */
    --warning:#f59e0b; /* Naranja - Pendiente */
    --danger:#ef4444;  /* Rojo - Rechazado */
    --grad:linear-gradient(135deg,#10b981,#34d399);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body { 
    background: radial-gradient(ellipse at top,rgba(16,185,129,.12),transparent 60%), var(--bg);
    color: var(--text); font-family: var(--font); margin: 0; min-height: 100vh;
  }

  /* --- LOGIN SCREEN --- */
  #login-screen {
    display: flex; align-items: center; justify-content: center; height: 100vh;
    position: fixed; width: 100%; top: 0; left: 0; z-index: 100; background: var(--bg);
  }
  .login-card { background: var(--panel); border: 1px solid var(--border); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .forgot-pass { display: block; margin-top: 20px; color: var(--muted); font-size: 13px; text-decoration: none; transition: 0.2s; cursor: pointer; }
  .forgot-pass:hover { color: var(--primary); text-decoration: underline; }

  /* --- STEPPER --- */
  .app-content { display: none; padding-top: 20px; }
  .stepper { display: flex; justify-content: space-between; max-width: 800px; margin: 20px auto; padding: 0 20px; position: relative; }
  .stepper::before { content: ''; position: absolute; top: 16px; left: 50px; right: 50px; height: 2px; background: var(--border); z-index: 1; }
  .step { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; flex: 1; }
  .circle-step { width: 32px; height: 32px; border-radius: 50%; background: var(--panel-2); border: 2px solid var(--border); display: grid; place-items: center; margin-bottom: 8px; font-size: 12px; font-weight: bold; transition: 0.3s; }
  .step.active .circle-step { background: var(--primary); color: #06281f; border-color: var(--primary); box-shadow: 0 0 20px rgba(16,185,129,0.3); }

  /* --- CARDS & FORMS --- */
  main { max-width: 900px; margin: 0 auto; padding: 20px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
  .step-content { display: none; }
  .step-content.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .field { margin-bottom: 20px; text-align: left; }
  .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
  input, textarea { width: 100%; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); outline: none; font-family: inherit; }

  /* --- RESULTADO DINÁMICO (Basado en image_baf0f6.png) --- */
  .result-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 1px; background: var(--border); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-top: 20px; }
  .result-block { background: var(--panel); padding: 25px; display: flex; align-items: center; gap: 20px; }
  
  /* Clases de estado dinámico */
  .state-approved { --status-color: var(--primary); }
  .state-pending { --status-color: var(--warning); }
  .state-rejected { --status-color: var(--danger); }

  .status-icon { 
    width: 60px; height: 60px; border-radius: 50%; border: 4px solid var(--status-color); 
    display: grid; place-items: center; color: var(--status-color); font-size: 30px; font-weight: bold; 
  }
  .status-text h2 { margin: 0; color: var(--status-color); font-size: 24px; letter-spacing: 1px; font-weight: 800; }
  .status-text p { margin: 5px 0; font-size: 13px; color: var(--muted); }
  
  .prob-block { flex-direction: column; justify-content: center; text-align: center; border-left: 1px solid var(--border); }
  .progress-ring { position: relative; width: 80px; height: 80px; margin: 0 auto; }
  .progress-ring svg { transform: rotate(-90deg); width: 80px; height: 80px; }
  .progress-ring circle { fill: none; stroke-width: 6; stroke-linecap: round; }
  .ring-bg { stroke: var(--panel-2); }
  .ring-fill { stroke: var(--status-color); stroke-dasharray: 188.5; stroke-dashoffset: 188.5; transition: stroke-dashoffset 1.5s ease-in-out; }
  .ring-perc { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 18px; color: var(--text); }

  /* --- BUTTONS --- */
  .nav-btns { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
  .btn { padding: 14px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; font-family: inherit; }
  .btn-primary { background: var(--grad); color: #06281f; width: 100%; }
  .btn-next { background: var(--grad); color: #06281f; flex: 2; }
  .btn-prev { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); flex: 1; }
  .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>

      </div>

      <!-- PASO 2 -->
      <div class="step-content" id="step-2">
        <h2 style="margin-top:0">Información Clínica</h2>
        <div class="field"><label>Diagnóstico CIE-10</label><input id="cie" placeholder="K80.2 - Colelitiasis"></div>

    <div class="card state-approved"> <!-- Cambiar a state-rejected o state-pending dinámicamente -->
        <div class="result-grid">
            <div class="result-block">
                <div class="status-icon">✓</div>
                <div class="status-text">
                    <h2>APROBADO</h2>
                    <p>Referencia: #MED-99281</p>
                </div>
            </div>
            <div class="result-block prob-block">
                <div class="progress-ring">
                    <svg>
                        <circle class="ring-bg" cx="40" cy="40" r="30"></circle>
                        <circle class="ring-fill" cx="40" cy="40" r="30"></circle>
                    </svg>
                    <div class="ring-perc">98%</div>
                </div>
                <p style="font-size: 10px; margin-top: 5px;">CONFIANZA IA</p>
            </div>
        </div>
        
        <div class="field" style="margin-top: 20px;">
            <label>Observaciones de la Auditoría</label>
            <textarea readonly>El análisis no detectó anomalías en la facturación. Los códigos CIE-10 coinciden con el tratamiento aplicado.</textarea>
        </div>
    </div>
</div>

      </div>
    </div>
  </main>
</div>

<script>
  let step = 1;

  function login() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
  }

  function move(delta) {
    if (delta === 1 && step === 3) {
      step++;
      updateUI();
      simulateAudit();
      return;
    }
    step += delta;
    updateUI();
  }

  function updateUI() {
    document.querySelectorAll('.step-content').forEach((s, i) => s.classList.toggle('active', i+1 === step));
    document.querySelectorAll('.step').forEach((s, i) => s.classList.toggle('active', i+1 === step));
    document.getElementById('btnPrev').disabled = (step === 1 || step === 4);
    document.getElementById('btnNext').style.display = (step === 4) ? 'none' : 'block';
    document.getElementById('btnNext').innerText = step === 3 ? 'Finalizar Auditoría' : 'Siguiente';
  }

  function simulateAudit() {
    // CAMBIA ESTA VARIABLE PARA PROBAR LOS 3 ESTADOS: 'approved', 'pending', 'rejected'
    const finalState = 'approved'; 

    setTimeout(() => {
      document.getElementById('loading-ia').style.display = 'none';
      const container = document.getElementById('status-container');
      const res = document.getElementById('resultado-final');
      res.style.display = 'block';
      
      const ring = document.getElementById('ring-fill');
      const percTxt = document.getElementById('perc-txt');
      const title = document.getElementById('status-title');
      const desc = document.getElementById('status-desc');
      const icon = document.getElementById('main-icon');

      if (finalState === 'approved') {
        container.className = 'result-grid state-approved';
        title.innerText = 'PRE-APROBADA';
        desc.innerText = 'Cumple con todos los requisitos.';
        icon.innerText = '✓';
        ring.style.strokeDashoffset = (188.5 * (1 - 0.96)); 
        percTxt.innerText = '96%';
      } else if (finalState === 'pending') {
        container.className = 'result-grid state-pending';
        title.innerText = 'PENDIENTE';
        desc.innerText = 'Requiere revisión manual de un auditor.';
        icon.innerText = '●';
        ring.style.strokeDashoffset = (188.5 * (1 - 0.50));
        percTxt.innerText = '50%';
      } else {
        container.className = 'result-grid state-rejected';
        title.innerText = 'RECHAZADA';
        desc.innerText = 'No cumple criterios de cobertura.';
        icon.innerText = '✕';
        ring.style.strokeDashoffset = (188.5 * (1 - 0.15));
        percTxt.innerText = '15%';
      }
    }, 2000);
  }
  const steps = document.querySelectorAll('.step-content');
const circles = document.querySelectorAll('.step');
let currentStep = 0;

function moveStep(delta) {
    steps[currentStep].classList.remove('active');
    circles[currentStep].classList.remove('active');
    
    currentStep += delta;
    
    steps[currentStep].classList.add('active');
    circles[currentStep].classList.add('active');
    
    // Si llegamos al final, animamos el anillo de progreso
    if (currentStep === 2) {
        setTimeout(animateRing, 500);
    }
}

function animateRing() {
    const ring = document.querySelector('.ring-fill');
    // Ejemplo: 85% de probabilidad
    const percent = 85;
    const offset = 188.5 - (188.5 * percent) / 100;
    ring.style.strokeDashoffset = offset;
}
</script>

<style>
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

</body>
</html>
