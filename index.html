<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MedAuth AI · Auditoría Médica</title>
<style>
  :root {
    --bg:#0e1116; --panel:#171a21; --panel-2:#1f2330; --border:#2a2f3d;
    --text:#eaf2ef; --muted:#8a93a3; --primary:#10b981; --primary-2:#34d399;
    --danger:#ef4444; --warn:#f59e0b; --ok:#10b981;
    --grad:linear-gradient(135deg,#10b981,#34d399);
    --glow:0 0 40px rgba(16,185,129,.25);
    --shadow:0 20px 60px -20px rgba(0,0,0,.7);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh; overflow-x: hidden;}
  body{background: radial-gradient(ellipse at top,rgba(16,185,129,.12),transparent 60%), var(--bg);}
  
  header{position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);background:rgba(14,17,22,.7);border-bottom:1px solid var(--border)}
  .wrap{max-width:1200px;margin:0 auto;padding:14px 22px;display:flex;justify-content:space-between;align-items:center}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:40px;height:40px;border-radius:12px;background:var(--grad);display:grid;place-items:center;box-shadow:var(--glow);font-size:20px}
  .brand h1{margin:0;font-size:17px}
  
  main{max-width:1200px;margin:0 auto;padding:24px 22px;display:grid;grid-template-columns:400px 1fr;gap:20px}
  @media(max-width:900px){main{grid-template-columns:1fr}}
  
  .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:600}
  
  input,textarea{width:100%;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:.15s}
  textarea{resize:vertical;min-height:70px}
  input:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(16,185,129,.15)}
  
  .file-input-wrapper { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .btn-file { 
    background: var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; 
    font-size: 11px; cursor: pointer; border: 1px solid transparent; transition: 0.2s;
  }
  .btn-file:hover { background: #3a4150; border-color: var(--primary); }
  .file-name { font-size: 11px; color: var(--primary-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
  input[type="file"] { display: none; }

  .btn{width:100%;padding:12px;border:0;border-radius:10px;background:var(--grad);color:#06281f;font-weight:700;font-size:14px;cursor:pointer;box-shadow:var(--glow);transition:.15s; margin-top: 10px;}
  .btn:hover{filter:brightness(1.1)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .chat{display:flex;flex-direction:column;height:75vh;background:var(--panel);border-radius:16px;border:1px solid var(--border);overflow:hidden}
  .chat-body{flex:1;overflow-y:auto;padding:20px; scroll-behavior: smooth;}
  
  .msg{margin-bottom:20px; animation: fadeIn 0.3s ease;}
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .msg.user .bubble{background:var(--panel-2); padding:12px; border-radius:12px 12px 2px 12px; border:1px solid var(--border); max-width:85%; margin-left:auto;}
  .msg.ai{display:flex; gap:12px;}
  .msg.ai .av{width:32px; height:32px; border-radius:8px; background:var(--grad); display:grid; place-items:center; flex-shrink:0;}
  .msg.ai .body{flex:1;}
  
  .badge{padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700; text-transform:uppercase;}
  .badge.ok{background:rgba(16,185,129,0.2); color:var(--primary);}

  .typing { display: flex; gap: 4px; padding: 10px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); animation: bounce 1.2s infinite; }
  @keyframes bounce { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; transform: translateY(-4px); } }

  .ai-response-box {
    margin-top: 10px;
    padding: 15px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    border-left: 4px solid var(--primary);
    font-size: 13px;
    line-height: 1.6;
    color: #e2e8f0;
    white-space: pre-wrap;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="brand">
      <div class="logo">🩺</div>
      <div>
        <h1>MedAuth AI</h1>
        <p style="margin:0; font-size:11px; color:var(--muted)">Sincronización Activa</p>
      </div>
    </div>
    <div class="status">
      <span class="badge ok">● Sistema Online</span>
    </div>
  </div>
</header>

<main>
  <section>
    <div class="card">
      <h2 style="margin:0 0 20px; font-size:16px">📋 Registro de Paciente</h2>
      
      <div class="field">
        <label>Nombre del Paciente</label>
        <input id="nombre" placeholder="Ej. Juan Pérez" />
      </div>

      <div class="field">
        <label>Correo Electrónico</label>
        <input type="email" id="email" placeholder="paciente@correo.com" />
      </div>

      <div class="field">
        <label>Póliza (Texto o Archivo)</label>
        <input id="poliza_text" placeholder="Número de Póliza" />
        <div class="file-input-wrapper">
          <label for="file_poliza" class="btn-file">📎 Adjuntar Póliza</label>
          <input type="file" id="file_poliza" onchange="updateFileName('file_poliza', 'name_poliza')">
          <span id="name_poliza" class="file-name"></span>
        </div>
      </div>

      <div class="field">
        <label>Informe Médico (Texto o Archivo)</label>
        <textarea id="informe_text" placeholder="Diagnóstico..."></textarea>
        <div class="file-input-wrapper">
          <label for="file_informe" class="btn-file">📎 Adjuntar Informe</label>
          <input type="file" id="file_informe" onchange="updateFileName('file_informe', 'name_informe')">
          <span id="name_informe" class="file-name"></span>
        </div>
      </div>

      <button class="btn" id="goBtn" onclick="sendToMake()">✨ Procesar Auditoría</button>
    </div>
  </section>

  <section class="chat">
    <div style="padding:15px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.02)">
      <h3 style="margin:0; font-size:14px">Resultado de la Auditoría</h3>
    </div>
    <div class="chat-body" id="chat">
      <div class="msg ai">
        <div class="av">✨</div>
        <div class="body">Esperando datos para iniciar el proceso de auditoría médica.</div>
      </div>
    </div>
  </section>
</main>

<script>
const WEBHOOK_URL = 'https://hook.us2.make.com/fuqy5gm1i8cznyp8fa1qpm14sjp3cvr9';

function updateFileName(inputId, spanId) {
    const input = document.getElementById(inputId);
    const span = document.getElementById(spanId);
    span.textContent = input.files.length > 0 ? input.files[0].name : "";
}

const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
});

async function sendToMake() {
    const nombre = document.getElementById('nombre').value.trim();
    const email = document.getElementById('email').value.trim();
    const polizaText = document.getElementById('poliza_text').value.trim();
    const informeText = document.getElementById('informe_text').value.trim();
    const filePoliza = document.getElementById('file_poliza').files[0];
    const fileInforme = document.getElementById('file_informe').files[0];
    const btn = document.getElementById('goBtn');
    const chat = document.getElementById('chat');

    if (!nombre || !email) {
        alert("Por favor, ingresa nombre y email."); return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Procesando Auditoría...';

    let polizaB64 = filePoliza ? await toBase64(filePoliza) : null;
    let informeB64 = fileInforme ? await toBase64(fileInforme) : null;

    chat.insertAdjacentHTML('beforeend', `<div class="msg user"><div class="bubble">Solicitando auditoría para <b>${nombre}</b>...</div></div>`);
    
    const typingId = 'typing-' + Date.now();
    chat.insertAdjacentHTML('beforeend', `
        <div class="msg ai" id="${typingId}">
            <div class="av">✨</div>
            <div class="body">
                <div class="typing"><span></span><span></span><span></span></div>
                El auditor está revisando su caso...
            </div>
        </div>
    `);
    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nombre, email,
                poliza_texto: polizaText,
                poliza_archivo: polizaB64,
                informe_texto: informeText,
                informe_archivo: informeB64,
                fecha: new Date().toLocaleString()
            })
        });

        // LEER COMO TEXTO PRIMERO (MÁS SEGURO)
        const rawText = await response.text();
        let finalMessage = "";

        try {
            // Intentamos ver si es un JSON
            const data = JSON.parse(rawText);
            finalMessage = data.motivo || data.mensaje || rawText;
        } catch (e) {
            // Si no es JSON, usamos el texto tal cual
            finalMessage = rawText;
        }

        const typingElement = document.getElementById(typingId);
        if(typingElement) typingElement.remove();
        
        chat.insertAdjacentHTML('beforeend', `
            <div class="msg ai">
                <div class="av">✨</div>
                <div class="body">
                    <p style="margin:0">✅ <b>Decisión de Auditoría:</b></p>
                    <div class="ai-response-box">${finalMessage}</div>
                    <p style="font-size:11px; color:var(--muted); margin-top:8px">Se ha enviado una copia detallada a <b>${email}</b></p>
                </div>
            </div>
        `);
    } catch (error) {
        console.error("Error:", error);
        const typingElement = document.getElementById(typingId);
        if(typingElement) typingElement.remove();
        alert("Error al conectar con MedAuth AI. Verifica tu conexión o los permisos CORS en Make.");
    } finally {
        btn.disabled = false;
        btn.textContent = '✨ Procesar Auditoría';
        chat.scrollTop = chat.scrollHeight;
    }
}
</script>
</body>
</html>
